<div class="flex col min-h">
    <h1 class="title blue fs-50px fs-sm-38px pt-80px px-80px px-sm-10px pt-sm-40px fs-sm-20px">Approfondimenti e articoli</h1>
    <h4 class="text gray w-60 w-md-100 w-sm-100 px-80px px-sm-10px pt-20px fs-sm-14px">
        Informazione e aggiornamento sulla salute urologica e andrologica
    </h4>
     <div class="  flex align-center pt-40px px-80px px-sm-40px wrap gap-30px">
            @for(article of store.articles$ | async; track $index){
                <article-card [date]="article.date" class="px-sm-0px zoom-md"  [index]="$index" [id]="article.id">
                    <p class="blue bold fs-20px">{{article.title}}</p>
                </article-card>
            }
        </div>
</div>

   <div class="flex footer align-center justify-between px-100px px-sm-10px bg-light-blue mt-100px mt-sm-60px">
        <div class="flex pl-120px">
            <p class="fs-15px pr-10px hide-sm">Segui su</p>
            <a href="https://www.facebook.com/enrico.conti.946" target="_blank">
                <img class="px-5px cursor-pointer" src="assets/img/facebook.svg" alt="Facebook Icon">
            </a>
            <a href="https://www.linkedin.com/in/enrico-conti-34b77956/" target="_blank">
                <img class="px-5px" src="assets/img/linkedin.svg" alt="LinkedIn Icon">
            </a>
        </div>
        <p class="fs-15px fs-sm-11px">© 2026 Dr. Enrico Conti – Tutti i diritti riservati</p>
    </div>
